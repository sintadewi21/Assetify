name: Build & Deploy to Azure VPS

on:
  push:
    branches:
      - main
    paths:
      - 'inventory-app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      laravel: ${{ steps.filter.outputs.laravel }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Filter paths
      id: filter
      uses: dorny/paths-filter@v4
      with:
        filters: |
          laravel:
            - 'inventory-app/**'
            - '.github/workflows/deploy.yml'
          frontend:
            - 'inventory-app/resources/css/**'
            - 'inventory-app/resources/js/**'
            - 'inventory-app/resources/views/**'
            - 'inventory-app/tailwind.config.js'
            - 'inventory-app/vite.config.js'
            - 'inventory-app/package.json'
            - 'inventory-app/package-lock.json'
          backend:
            - 'inventory-app/**'
            - '.github/workflows/deploy.yml'
            - '!inventory-app/resources/css/**'
            - '!inventory-app/resources/js/**'
            - '!inventory-app/resources/views/**'
            - '!inventory-app/tailwind.config.js'
            - '!inventory-app/vite.config.js'
            - '!inventory-app/package.json'
            - '!inventory-app/package-lock.json'

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      working-directory: inventory-app

    - name: Run Pint (Linter)
      run: vendor/bin/pint --test
      working-directory: inventory-app

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: needs.detect-changes.outputs.backend == 'true'

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: pcov

    - name: Copy .env file for Testing
      run: cp .env.example .env
      working-directory: inventory-app

    - name: Get Composer Cache Directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      working-directory: inventory-app

    - name: Cache Composer Dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('inventory-app/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      working-directory: inventory-app

    - name: Generate Laravel Application Key
      run: php artisan key:generate
      working-directory: inventory-app

    - name: Run PHPUnit Tests (PHP)
      run: php artisan test --coverage-text
      working-directory: inventory-app

  coverage-summary:
    needs: [detect-changes, test]
    runs-on: ubuntu-latest
    if: always() && needs.detect-changes.outputs.backend == 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pcov
          coverage: pcov

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Composer Dependencies
        working-directory: inventory-app
        run: composer install

      - name: Run Tests and Generate Clover XML
        working-directory: inventory-app
        run: |
          cp .env.example .env
          php artisan key:generate
          # Eksekusi phpunit dan keluarkan hasil clover XML ke direktori utama (root)
          vendor/bin/phpunit --coverage-clover ../coverage.xml

      - name: Install Node Dependencies & Run Parser Script
        run: |
          npm install xml2js
          node parse-laravel-coverage.js

  deploy:
    name: Deploy via SSH to Azure VPS
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, test, coverage-summary]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.laravel == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Deploy via SSH to Azure
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          sudo git config --global --add safe.directory /var/www/assetify
          git config --global --add safe.directory /var/www/assetify
          cd /var/www/assetify
          sudo git pull origin main
          cd /var/www/assetify/inventory-app
          sudo chmod +x deploy.sh
          sudo ./deploy.sh