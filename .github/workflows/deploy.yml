name: Build & Deploy to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'inventory-app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      laravel: ${{ steps.filter.outputs.laravel }}
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Filter paths
      id: filter
      uses: dorny/paths-filter@v4
      with:
        filters: |
          laravel:
            - 'inventory-app/**'
            - '.github/workflows/deploy.yml'

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.laravel == 'true'

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      working-directory: inventory-app

    - name: Run Pint (Linter)
      run: vendor/bin/pint --test
      working-directory: inventory-app

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: needs.detect-changes.outputs.laravel == 'true'

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: pcov

    - name: Copy .env file for Testing
      run: cp .env.example .env
      working-directory: inventory-app

    - name: Get Composer Cache Directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      working-directory: inventory-app

    - name: Cache Composer Dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('inventory-app/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      working-directory: inventory-app

    - name: Generate Laravel Application Key
      run: php artisan key:generate
      working-directory: inventory-app

    - name: Run PHPUnit Tests (PHP)
      run: php artisan test --coverage-text
      working-directory: inventory-app

  coverage-summary:
    needs: [detect-changes, test]
    runs-on: ubuntu-latest
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pcov
          coverage: pcov

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Composer Dependencies
        working-directory: inventory-app
        run: composer install

      - name: Run Tests and Generate Clover XML
        working-directory: inventory-app
        run: |
          cp .env.example .env
          php artisan key:generate
          # Eksekusi phpunit dan keluarkan hasil clover XML ke direktori utama (root)
          vendor/bin/phpunit --coverage-clover ../coverage.xml

      - name: Install Node Dependencies & Run Parser Script
        run: |
          npm install xml2js
          node parse-laravel-coverage.js

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, test, coverage-summary]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.laravel == 'true' && needs.test.result == 'success'

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: none

    - name: Get Composer Cache Directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      working-directory: inventory-app

    - name: Cache Composer Dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-prod-${{ hashFiles('inventory-app/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-prod-

    - name: Install Composer Production Dependencies
      run: composer install --no-dev --optimize-autoloader --no-ansi --no-interaction --no-scripts --no-progress
      working-directory: inventory-app

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache Node Modules
      id: npm-cache-deploy
      uses: actions/cache@v4
      with:
        path: inventory-app/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('inventory-app/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install NPM Dependencies & Build Assets
      run: |
        if [ "${{ steps.npm-cache-deploy.outputs.cache-hit }}" != "true" ]; then
          npm ci
        fi
        npm run build
      working-directory: inventory-app

    - name: Create Deployment Package
      run: |
        mkdir -p deployment-package
        cp -r inventory-app/* deployment-package/ 2>/dev/null || true

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: deployment-package