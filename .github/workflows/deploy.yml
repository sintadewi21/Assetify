name: Deploy Assetify to Azure VPS

on:
  push:
    branches:
      - main
    paths:
      - 'inventory-app/**'
      - '.github/workflows/deploy.yml'

jobs:
  lint-and-test:
    name: Lint & Test Application
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 1. Setup PHP & Composer (for Laravel test)
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: none

    - name: Copy .env file for Testing
      run: cp .env.example .env
      working-directory: inventory-app

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      working-directory: inventory-app

    - name: Generate Laravel Application Key
      run: php artisan key:generate
      working-directory: inventory-app

    # 2. Setup Node.js & npm (for ESLint, Prettier, Jest test)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'inventory-app/package-lock.json'

    - name: Install NPM Dependencies
      run: npm ci
      working-directory: inventory-app

    # 3. Run Linters and Formatters
    - name: Run Prettier Check
      run: npm run format:check
      working-directory: inventory-app

    - name: Run ESLint
      run: npm run lint
      working-directory: inventory-app

    # 4. Run Tests
    - name: Run Jest Tests (JS)
      run: npm run test
      working-directory: inventory-app

    - name: Run PHPUnit Tests (PHP)
      run: php artisan test
      working-directory: inventory-app

  deploy:
    name: Deploy via SSH to Azure
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Deploy via SSH to Azure
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd /var/www/assetify/inventory-app
          sudo git pull origin main
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear