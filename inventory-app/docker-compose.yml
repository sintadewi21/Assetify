version: '3.8'

services:
  # Laravel Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: inlife-inventory-app:latest
    container_name: inlife_web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=db_inventory_telkomsel
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
    depends_on:
      - db
    networks:
      - inlife-network

  # MySQL Database Server
  db:
    image: mysql:8.0
    container_name: inlife_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=db_inventory_telkomsel
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inlife-network

volumes:
  db_data:

networks:
  inlife-network:
    driver: bridge
